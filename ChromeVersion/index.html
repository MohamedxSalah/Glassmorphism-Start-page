<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="settings-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div class="glass-container">
        <h1 id="clock">00:00</h1>
        <h2 id="greeting">Hello</h2>
        
        <div id="weather-container">
            <span id="weather-icon"></span>
            <span id="weather-temp">--°C</span>
            <span id="weather-desc">Loading weather...</span>
        </div>
        
        <form action="https://www.google.com/search" method="GET" class="search-form">
            <input type="text" name="q" placeholder="Search the web..." autofocus autocomplete="off">
            <button type="submit">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </form>

        <div class="shortcuts" id="shortcuts-grid"></div>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="close-modal" class="icon-btn">&times;</button>
            </div>
            
            <div class="setting-section">
                <h4>Background Wallpaper</h4>
                <select id="bg-type-select">
                    <option value="default">Default Blur Art</option>
                    <option value="rotation">Rotational Unsplash</option>
                    <option value="web">Web Image URL</option>
                    <option value="local">Local File Upload</option>
                </select>
                
                <div id="bg-rotation-group" class="bg-input-group-vertical hidden">
                    <label class="setting-label">Update Interval:</label>
                    <select id="bg-interval-select">
                        <option value="1">Every Hour</option>
                        <option value="12">Every 12 Hours</option>
                        <option value="24">Every Day</option>
                    </select>
                </div>
                
                <div id="bg-web-group" class="bg-input-group hidden">
                    <input type="url" id="bg-url-input" placeholder="Paste image URL (https://...)" autocomplete="off">
                    <button id="save-bg-url-btn" class="primary-btn small-btn">Apply</button>
                </div>

                <div id="bg-local-group" class="bg-input-group hidden">
                    <label for="bg-file-input" class="file-label">Choose Image File</label>
                    <input type="file" id="bg-file-input" accept="image/*">
                </div>

                <div class="bg-input-group-vertical" style="margin-top: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="setting-label">Glass Blur Intensity:</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span id="blur-value-display" style="font-size: 0.85rem; opacity: 0.8; font-weight: 600;">25px</span>
                            <button id="reset-blur-btn" type="button" style="background: none; border: none; color: #ff6b6b; font-size: 0.75rem; cursor: pointer; padding: 0; text-decoration: underline; opacity: 0.8;">Reset</button>
                        </div>
                    </div>
                    <input type="range" id="blur-slider" min="0" max="50" value="25" step="1" style="width: 100%; cursor: pointer;">
                </div>

                <div class="bg-input-group-vertical" style="margin-top: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="setting-label">Glass Darkness:</label>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span id="darkness-value-display" style="font-size: 0.85rem; opacity: 0.8; font-weight: 600;">25%</span>
                            <button id="reset-darkness-btn" type="button" style="background: none; border: none; color: #ff6b6b; font-size: 0.75rem; cursor: pointer; padding: 0; text-decoration: underline; opacity: 0.8;">Reset</button>
                        </div>
                    </div>
                    <input type="range" id="darkness-slider" min="0" max="80" value="25" step="1" style="width: 100%; cursor: pointer;">
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; padding: 10px 14px; background: rgba(255,255,255,0.05); border-radius: 10px;">
                    <label class="setting-label" style="margin: 0; cursor: pointer;" for="dark-text-toggle">Dark Text Mode</label>
                    <label style="position: relative; display: inline-block; width: 42px; height: 24px; cursor: pointer;">
                        <input type="checkbox" id="dark-text-toggle" style="opacity: 0; width: 0; height: 0; position: absolute;">
                        <span id="toggle-track" style="position: absolute; inset: 0; background: rgba(255,255,255,0.15); border-radius: 24px; transition: background 0.2s;"></span>
                        <span id="toggle-thumb" style="position: absolute; left: 3px; top: 3px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3);"></span>
                    </label>
                </div>
            </div>

            <hr class="modal-divider">

            <div class="setting-section">
                <h4>Clock</h4>
                <select id="clock-format-select">
                    <option value="24">24-Hour (14:30)</option>
                    <option value="12">12-Hour (2:30 PM)</option>
                </select>
            </div>

            <hr class="modal-divider">

            <div class="setting-section">
                <h4>Add New Shortcut</h4>
                <form id="add-shortcut-form">
                    <input type="text" id="site-name" placeholder="Website Name" required autocomplete="off">
                    <input type="url" id="site-url" placeholder="URL (https://...)" required autocomplete="off">
                    <button type="submit" class="primary-btn">Add Shortcut</button>
                </form>
            </div>

            <hr class="modal-divider">

            <div class="setting-section">
                <h4>Manage Shortcuts</h4>
                <div id="manage-list" class="manage-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
